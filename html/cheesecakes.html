<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheesecakes - Recetas Caseras</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body class="cheesecakes-page">
    <header class="site-header">
        <a class="btn-back" href="../Principal.html">Volver al inicio</a>
        <h1>Cheesecakes</h1>
    </header>
    <main>
        <section class="Listado-recetas">
            <!-- Cheesecake Clásico -->
            <article class="receta-carta1" onclick="showModal('clasico')">
                <div class="card-body">
                    <img src="../imagenes/cheesecake.jpg" alt="Cheesecake Clásico">
                    <h2>Cheesecake Clásico</h2>
                    <p>Cremoso y sofisticado, perfecto para ocasiones especiales.</p>
                    <button class="btn">Ver receta</button>
                </div>
            </article>

            <!-- Cheesecake de Fresas -->
            <article class="receta-carta1" onclick="showModal('fresas')">
                <div class="card-body">
                    <img src="../imagenes/cheesecake-fresas.jpg" alt="Cheesecake de Fresas">
                    <h2>Cheesecake de Fresas</h2>
                    <p>Con mermelada de fresas y frutas frescas.</p>
                    <button class="btn">Ver receta</button>
                </div>
            </article>

            <!-- Cheesecake de Chocolate -->
            <article class="receta-carta1" onclick="showModal('chocolate')">
                <div class="card-body">
                    <img src="../imagenes/cheesecake-chocolate.jpg" alt="Cheesecake de Chocolate">
                    <h2>Cheesecake de Chocolate</h2>
                    <p>Intenso y delicioso con cobertura de chocolate.</p>
                    <button class="btn">Ver receta</button>
                </div>
            </article>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Recetas Caseras</p>
    </footer>

    <!-- Modal overlay -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content" id="modalContent">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <h2 id="modalTitle"></h2>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        function showModal(recipe) {
            const titleMap = {
                clasico: 'Cheesecake Clásico',
                fresas: 'Cheesecake de Fresas',
                chocolate: 'Cheesecake de Chocolate'
            };
            const contentMap = {
                clasico: `
                    <p><strong>Ingredientes (para 6 cheesecakes):</strong></p>
                    <ul>
                        <li>200g de galletas digestivas</li>
                        <li>100g de mantequilla derretida</li>
                        <li>500g de queso crema</li>
                        <li>100g de azúcar</li>
                        <li>2 huevos</li>
                        <li>1 cucharadita de vainilla</li>
                        <li>Jugo de 1/2 limón</li>
                    </ul>
                    <p><strong>Preparación:</strong></p>
                    <ol>
                        <li>Precalentar horno a 160°C.</li>
                        <li>Procesar galletas hasta obtener migas.</li>
                        <li>Mezclar migas con mantequilla derretida.</li>
                        <li>Presionar en moldes individuales.</li>
                        <li>Batir queso crema con azúcar.</li>
                        <li>Agregar huevos, vainilla y limón.</li>
                        <li>Verter sobre bases.</li>
                        <li>Hornear en baño maría 25-30 minutos.</li>
                        <li>Refrigerar mínimo 4 horas.</li>
                    </ol>
                `,
                fresas: `
                    <p><strong>Ingredientes:</strong></p>
                    <ul>
                        <li>Base de galletas (200g galletas + 100g mantequilla)</li>
                        <li>600g de queso crema</li>
                        <li>120g de azúcar</li>
                        <li>2 huevos</li>
                        <li>200g de mermelada de fresas</li>
                        <li>Fresas frescas para decorar</li>
                        <li>1 cucharadita de vainilla</li>
                    </ul>
                    <p><strong>Preparación:</strong></p>
                    <ol>
                        <li>Preparar base de galletas.</li>
                        <li>Batir queso crema con azúcar.</li>
                        <li>Agregar huevos y vainilla.</li>
                        <li>Verter 2/3 de la mezcla sobre las bases.</li>
                        <li>Agregar mermelada de fresas.</li>
                        <li>Cubrir con resto de mezcla.</li>
                        <li>Hornear en baño maría 30-35 minutos.</li>
                        <li>Decorar con fresas frescas.</li>
                    </ol>
                `,
                chocolate: `
                    <p><strong>Ingredientes:</strong></p>
                    <ul>
                        <li>Base de galletas (200g galletas + 100g mantequilla)</li>
                        <li>600g de queso crema</li>
                        <li>120g de azúcar</li>
                        <li>2 huevos</li>
                        <li>200g de chocolate derretido</li>
                        <li>1 cucharadita de vainilla</li>
                        <li>Virutas de chocolate para decorar</li>
                    </ul>
                    <p><strong>Preparación:</strong></p>
                    <ol>
                        <li>Preparar base de galletas.</li>
                        <li>Batir queso crema con azúcar.</li>
                        <li>Agregar huevos y vainilla.</li>
                        <li>Reservar 1/2 de mezcla.</li>
                        <li>Mezclar chocolate derretido en la otra mitad.</li>
                        <li>Alternar capas en los moldes.</li>
                        <li>Hornear en baño maría 30-35 minutos.</li>
                        <li>Decorar con virutas de chocolate.</li>
                    </ol>
                `
            };
            document.getElementById('modalTitle').textContent = titleMap[recipe];
            document.getElementById('modalBody').innerHTML = contentMap[recipe];
            document.getElementById('modalOverlay').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
